name: Commit Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
      - run: npm ci
      - name: Install commitlint
        run: npm install --save-dev @commitlint/{config-conventional,cli}
      - name: Lint commits
        run: |
          npx commitlint --from=HEAD~10 --to=HEAD --config commitlint.config.js
